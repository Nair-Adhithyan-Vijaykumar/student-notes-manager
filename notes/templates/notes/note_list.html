{% extends 'notes/base.html' %}
{% block content %}
<a href="{% url 'note_create' %}" class="btn btn-green">+ Add New Note</a>
<br><br>
<table>
    <tr><th>Student</th><th>Subject</th><th>Date</th><th>Actions</th></tr>
    {% for note in notes %}
    <tr>
        <td>{{ note.student_name }}</td>
        <td>{{ note.subject }}</td>
        <td>{{ note.created_at|date:"d M Y" }}</td>
        <td>
            <a href="{% url 'note_edit' note.pk %}" class="btn btn-blue">Edit</a>
            <a href="{% url 'note_delete' note.pk %}" class="btn btn-red">Delete</a>
        </td>
    </tr>
    {% empty %}
    <tr><td colspan="4">No notes yet. Add one!</td></tr>
    {% endfor %}
</table>
{% endblock %}
