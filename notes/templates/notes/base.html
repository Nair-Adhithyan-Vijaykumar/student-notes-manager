<!DOCTYPE html>
<html>
<head>
    <title>Student Notes Manager</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
        h1 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #2c3e50; color: white; }
        a { color: #2980b9; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; color: white; }
        .btn-green  { background: #27ae60; }
        .btn-red    { background: #e74c3c; }
        .btn-blue   { background: #2980b9; }
    </style>
</head>
<body>
    <h1>📓 Student Notes Manager</h1>
    {% block content %}{% endblock %}
</body>
</html>
