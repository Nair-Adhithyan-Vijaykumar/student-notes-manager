{% extends 'notes/base.html' %}
{% block content %}
<h2>{{ title }}</h2>
<form method="post" style="background:white; padding:20px; border-radius:8px;">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-green">Save Note</button>
    <a href="{% url 'note_list' %}">Cancel</a>
</form>
{% endblock %}
